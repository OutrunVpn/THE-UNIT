<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>The UNIT Game</title>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>\n    <style>\n        body { margin: 0; overflow: hidden; }\n        canvas { display: block; }\n        #batteryBar { position: absolute; top: 10px; left: 10px; width: 200px; height: 20px; background-color: red; }\n        #sanityMeter { position: absolute; top: 40px; left: 10px; width: 200px; height: 20px; background-color: green; }\n        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; background: url('crosshair.png') no-repeat center center; background-size: contain; }\n    </style>\n</head>\n<body>\n    <canvas id="gameCanvas"></canvas>\n    <div id="batteryBar"></div>\n    <div id="sanityMeter"></div>\n    <div id="crosshair"></div>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const scene = new THREE.Scene();\n        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);\n        const renderer = new THREE.WebGLRenderer({ canvas });\n        renderer.setSize(window.innerWidth, window.innerHeight);\n        camera.position.z = 5;\n        function animate() {\n            requestAnimationFrame(animate);\n            renderer.render(scene, camera);\n        }\n        animate();\n    <\/script>\n</body>\n</html>
